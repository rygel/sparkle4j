build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
  CyclomaticComplexMethod:
    threshold: 15
  LongMethod:
    threshold: 60
  TooManyFunctions:
    thresholdInClasses: 20
    thresholdInFiles: 15
    ignoreOverridden: true

style:
  ReturnCount:
    max: 5
  MagicNumber:
    active: false
  ForbiddenComment:
    active: true
    comments: ['TODO:', 'FIXME:', 'STOPSHIP:', 'HACK:']
  MaxLineLength:
    maxLineLength: 160
  WildcardImport:
    active: true
    excludeImports:
      - 'javax.swing.*'

performance:
  SpreadOperator:
    active: false

naming:
  FunctionNaming:
    excludes: ['**/test/**']
  VariableNaming:
    excludes: ['**/test/**']
