name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - java-version: '17'
            # Java 17: compile + test only (some quality plugins require 21+)
            maven-goals: 'test'
            maven-args: '-Dcheckstyle.skip -Dspotless.check.skip -Dpmd.skip -Dspotbugs.skip -Dmodernizer.skip -Dtidy.check.skip'
          - java-version: '21'
            # Java 21: full verify with all quality tools
            maven-goals: 'verify'
            maven-args: ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn ${{ matrix.maven-goals }} -T 4 ${{ matrix.maven-args }}
