name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn verify -T 4

  build-complete:
    name: build
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more build matrix jobs failed"
            exit 1
          fi

  desktop-tests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run desktop and applier tests under Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &>/dev/null &
          sleep 1
          mvn test -T 4 \
            -Dtest='io.github.rygel.sparkle4j.ui.UpdateDialogTest,io.github.rygel.sparkle4j.apply.LinuxApplierTest,io.github.rygel.sparkle4j.apply.MacosApplierTest,io.github.rygel.sparkle4j.apply.WindowsApplierTest' \
            -Dsurefire.excludes='' \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          DISPLAY: ':99'
